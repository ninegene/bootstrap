pre-commit:
  parallel: true
  commands:
    shellcheck:
      glob: "**/*.sh"
      run: shellcheck --severity=warning {staged_files}

    shfmt:
      glob: "**/*.sh"
      run: shfmt -w -i 4 -ci {staged_files}
      stage_fixed: true

    markdownlint:
      glob: "**/*.md"
      run: npx --yes markdownlint-cli {staged_files}
